name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stock_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      clickhouse:
        image: clickhouse/clickhouse-server:24.12.6.70
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhouse
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --user default --password clickhouse --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/stock_test
      TEST_CLICKHOUSE_URL: http://127.0.0.1:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -q
